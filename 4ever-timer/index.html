<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4ever Timer</title>
    <style>
        :root {
            --bg-color: #e8f2ed; /* Soft sage green tint */
            --card-bg: #ffffff;
            --primary: #40826D;  /* Her favorite emerald green */
            --dark-green: #235143; 
            --text: #2c3e38;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(64, 130, 109, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 15px;
            margin-bottom: 5px;
            color: var(--dark-green);
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 20px;
        }

        /* Special Monthversary Banner Styling */
        .monthversary-banner {
            display: none;
            background: linear-gradient(135deg, #40826D, #235143);
            color: #ffffff;
            padding: 16px 20px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(64, 130, 109, 0.25);
            animation: popBanner 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .monthversary-banner h3 {
            font-size: 1.15rem;
            margin-bottom: 4px;
        }

        .monthversary-banner p {
            font-size: 0.85rem;
            opacity: 0.9;
            line-height: 1.3;
        }

        @keyframes popBanner {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Restored Onboarding Guide Banner */
        .ios-prompt {
            background: #f0f7f4;
            border: 1.5px dashed var(--primary);
            color: var(--dark-green);
            padding: 14px;
            border-radius: 16px;
            font-size: 0.85rem;
            margin-bottom: 25px;
            line-height: 1.4;
            width: 100%;
            display: none; /* Hidden by default, JS reveals it if needed */
            position: relative;
        }

        .ios-prompt strong {
            color: var(--primary);
        }

        .close-prompt {
            position: absolute;
            top: 6px;
            right: 10px;
            background: none;
            border: none;
            font-size: 1.1rem;
            color: var(--dark-green);
            opacity: 0.5;
            cursor: pointer;
        }

        /* Timer Grid Layout */
        .timer-box {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: 100%;
            margin-bottom: 30px;
        }

        .time-unit {
            background: var(--bg-color);
            padding: 12px 5px;
            border-radius: 14px;
        }

        .time-num {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--dark-green);
            display: block;
        }

        .time-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            margin-top: 2px;
            display: block;
        }

        /* Interactive Action Button */
        .imy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 36px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(64, 130, 109, 0.3);
            transition: all 0.2s ease;
            outline: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin-bottom: 15px;
            width: 85%;
        }

        .imy-btn:active {
            transform: scale(0.96);
            box-shadow: 0 3px 10px rgba(64, 130, 109, 0.3);
        }

        /* Decorative Floating Heart Elements */
        .heart {
            position: absolute;
            font-size: 24px;
            color: var(--primary);
            pointer-events: none;
            animation: floatUp 1.2s ease-out forwards;
            user-select: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-120px) scale(1.3) rotate(15deg);
                opacity: 0;
            }
        }

        .status-msg {
            font-size: 0.9rem;
            color: var(--dark-green);
            height: 20px;
            font-weight: 500;
        }
    </style>
    
    <!-- Canvas Confetti Engine -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- OneSignal Web SDK Injection -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        window.OneSignalDeferred.push(async function(OneSignal) {
            try {
                await OneSignal.init({
                    appId: "19502337-1f76-4600-a1de-1e499263572c",
                    safari_web_id: "web.onesignal.auto.0654afc0-ce06-4b31-9757-37165e976417",
                    notifyButton: { enable: false },
                    serviceWorkerParam: { scope: "/" },
                    serviceWorkerPath: "/OneSignalSDKWorker.js"
                });
                
                // Assign specific target tags based on who is visiting the page
                if (typeof currentUser !== 'undefined') {
                    if (currentUser === 'her') {
                        OneSignal.User.addTag("user_role", "her");
                    } else if (currentUser === 'me') {
                        OneSignal.User.addTag("user_role", "me");
                    }
                }

                // Explicitly prompt for notifications if not already granted
                if (OneSignal.Notifications && !OneSignal.Notifications.permission) {
                    await OneSignal.Notifications.requestPermission();
                }
            } catch (error) {
                console.error("OneSignal Initialization Error:", error);
            }
        });
    </script>
</head>
<body>

    <div class="container" id="mainContainer">
        <!-- Persistent Hub Navigation Link -->
        <a href="../index.html" class="back-btn" id="backLink">◀ Hub</a>

        <h1 id="greeting">Our Timeline</h1>
        <p class="subtitle" id="subGreeting">Every second matters</p>

        <!-- Special Monthversary Banner -->
        <div id="monthversaryBanner" class="monthversary-banner">
            <h3 id="monthversaryTitle">🎉 Happy Monthversary! 🎉</h3>
            <p id="monthversarySub">Another month of loving you baby! ❤️</p>
        </div>

        <!-- Onboarding Guide for Her iPhone -->
        <div class="ios-prompt" id="iosPrompt">
            <button class="close-prompt" onclick="document.getElementById('iosPrompt').style.display='none'">×</button>
            <p>Baby, to unlock the full magic, tap the Safari Share button 📤 below and select <strong>'Add to Home Screen'</strong>!</p>
        </div>

        <!-- Precision Countdown Engine Grid -->
        <div class="timer-box">
            <div class="time-unit">
                <span class="time-num" id="days">00</span>
                <span class="time-label">Days</span>
            </div>
            <div class="time-unit">
                <span class="time-num" id="hours">00</span>
                <span class="time-label">Hrs</span>
            </div>
            <div class="time-unit">
                <span class="time-num" id="mins">00</span>
                <span class="time-label">Mins</span>
            </div>
            <div class="time-unit">
                <span class="time-num" id="secs">00</span>
                <span class="time-label">Secs</span>
            </div>
        </div>

        <!-- Notification Dispatch Trigger -->
        <button class="imy-btn" id="actionBtn" onclick="sendSignal()">I Miss You 💚</button>
        <p class="status-msg" id="statusText"></p>
    </div>

    <script>
        // Set relationship milestone date (May 21st, 2026 at Midnight)
        const startDate = new Date(2026, 4, 21, 0, 0, 0);

        // Capture url target parameter tags (?user=me / ?user=her)
        const urlParams = new URLSearchParams(window.location.search);
        const currentUser = urlParams.get('user') || 'her';

        const greeting = document.getElementById('greeting');
        const subGreeting = document.getElementById('subGreeting');
        const actionBtn = document.getElementById('actionBtn');
        const statusText = document.getElementById('statusText');
        const backLink = document.getElementById('backLink');
        const iosPrompt = document.getElementById('iosPrompt');

        // Maintain user states down back navigation loops
        if (window.location.search) {
            backLink.href += window.location.search;
        }

        // Check if app is running standalone (PWA mode installed on Home Screen)
        const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;

        // Tailor UI text and onboarding visibility depending on active device user
        if (currentUser === 'me') {
            greeting.innerText = "Hey You!";
            subGreeting.innerText = "Thinking of her?";
            actionBtn.innerText = "Send a Miss You 💚";
        } else {
            greeting.innerText = "Hey Thangam!";
            subGreeting.innerText = "Every single second with you counts, Literally lol";
            actionBtn.innerText = "I Miss You 💚";
            
            // Show iOS prompt only for her if not already installed as an app
            if (!isStandalone) {
                iosPrompt.style.display = 'block';
            }
        }

        // Check for 21st of the month celebration & trigger confetti
        function checkMonthversary() {
            const today = new Date();
            const day = today.getDate();

            if (day === 21) {
                let months = (today.getFullYear() - startDate.getFullYear()) * 12 + (today.getMonth() - startDate.getMonth());
                if (months < 1) months = 1;

                const banner = document.getElementById('monthversaryBanner');
                const title = document.getElementById('monthversaryTitle');
                const sub = document.getElementById('monthversarySub');

                if (banner) {
                    if (title) title.innerText = `🎉 Happy ${months} Month${months > 1 ? 's' : ''} Anniversary! 🎉`;
                    if (sub) sub.innerText = currentUser === 'me'
                        ? `Happy 21st, my love! Here's to another wonderful month together! ❤️`
                        : `Happy 21st, my thangam! Another month of loving you! ❤️`;
                    banner.style.display = 'block';
                }

                // Trigger Confetti Celebration
                if (typeof confetti === 'function') {
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 }
                    });

                    setTimeout(() => {
                        confetti({ particleCount: 50, angle: 60, spread: 55, origin: { x: 0 } });
                        confetti({ particleCount: 50, angle: 120, spread: 55, origin: { x: 1 } });
                    }, 400);
                }
            }
        }
        checkMonthversary();

        // Mathematical calculation engine running the real-time clock delta
        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = days.toString().padStart(2, '0');
            document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
            document.getElementById('mins').innerText = mins.toString().padStart(2, '0');
            document.getElementById('secs').innerText = secs.toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // Rotating First-Person Sweet Message Banks
        const messagesForHer = [
            { title: "I miss you pretty baby 💚", body: "Just wanted to remind you how much you mean to me!" },
            { title: "I love you my thangam ✨", body: "You're always on my mind, baby." },
            { title: "Wish I was with you now baby 😘", body: "Counting down the seconds until we're together." },
            { title: "Thinking of you always ❤️", body: "Sending you the biggest hug right now!" },
            { title: "You're my whole world 🌎", body: "Hope this brings a smile to your pretty face!" },
            { title: "Can't wait to see you again 🥰", body: "Every second without you feels too long." },
            { title: "My sweet thangam 💕", body: "Just sending a little love your way today." },
            { title: "You have my whole heart 💚", body: "Forever and always, my favorite person." },
            { title: "Sending you a massive hug 🤗", body: "Wish I could hold you close right now!" },
            { title: "You're on my mind, gorgeous ✨", body: "I love you more than words can say!" }
        ];

        const messagesForHim = [
            { title: "I miss you angel 💚", body: "Wish you were here with me right now!" },
            { title: "I love you so much ❤️", body: "Just thinking about you and smiling." },
            { title: "You have my whole heart 😘", body: "Sending you all my love today!" },
            { title: "Wish I was in your arms ✨", body: "Counting down the minutes until I see you!" },
            { title: "Thinking of you, my love 🥰", body: "You make every single day better." },
            { title: "I need a hug from you 🤗", body: "Just wanted to send a little reminder that I love you!" },
            { title: "My favorite person 💕", body: "Forever yours, always and forever." },
            { title: "I miss my baby 🥺", body: "Come see me soon, okay?" }
        ];

        // REST API execution to trigger randomized first-person alerts securely
        function sendSignal() {
            createHearts();
            statusText.innerText = "Sending love...";

            let targetRole = currentUser === 'her' ? 'me' : 'her';
            
            // Pick a random message from the appropriate rotation bank
            let pool = currentUser === 'her' ? messagesForHim : messagesForHer;
            let randomChoice = pool[Math.floor(Math.random() * pool.length)];
            
            let messageTitle = randomChoice.title;
            let messageBody = randomChoice.body;

            fetch("/api/send-notification", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    targetRole: targetRole,
                    messageTitle: messageTitle,
                    messageBody: messageBody
                })
            })
            .then(response => {
                if (response.ok) {
                    statusText.innerText = "Sent! ✨";
                    setTimeout(() => statusText.innerText = "", 3000);
                } else {
                    statusText.innerText = "Failed to send.";
                }
            })
            .catch(err => {
                statusText.innerText = "Connection error.";
                console.error(err);
            });
        }

        // Particle heart emitter system 
        function createHearts() {
            const btn = document.getElementById('actionBtn');
            const rect = btn.getBoundingClientRect();
            const container = document.getElementById('mainContainer');

            for (let i = 0; i < 6; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = '💚';
                
                const randomX = rect.left + (Math.random() * rect.width) - container.getBoundingClientRect().left;
                const randomY = rect.top - container.getBoundingClientRect().top;
                
                heart.style.left = `${randomX}px`;
                heart.style.top = `${randomY}px`;
                
                container.appendChild(heart);
                setTimeout(() => heart.remove(), 1200);
            }
        }
    </script>
</body>
</html>
